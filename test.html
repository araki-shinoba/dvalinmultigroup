<script>
const tableWidthInput = document.getElementById('tablewidth');
const tableFontInput = document.getElementById('tablefont');

function updateTableWidth() {
    const width = Number(tableWidthInput.value);

    if (!isNaN(width) && width > 0) {
        document.querySelectorAll('.tabletarget td').forEach(td => {
            td.style.width = width + 'px';
        });
    }
}

function updateTableFont() {
    const fontSize = Number(tableFontInput.value);

    if (!isNaN(fontSize) && fontSize > 0) {
        document.querySelectorAll('.tabletarget').forEach(table => {
            table.style.fontSize = fontSize + 'px';
        });
    }
}

tableWidthInput.addEventListener('input', updateTableWidth);
tableFontInput.addEventListener('input', updateTableFont);

// 初期値を反映
updateTableWidth();
updateTableFont();
</script>
